schema_version: 1
case_name: u_bracket_trim_mount
scale_mm_per_px: 4
pad_mm: 25
intent_note: SKELETON for a U-bracket for an interior trim mount. Main plate is 160x160mm.
  Two flanges fold off the left and right sides. Each flange has a cap panel folded
  off its top edge. One cap is wider than its parent flange (C3), and one cap fold
  is a valley fold (C2). The main plate has a tab carve on the bottom to create an
  irregular outline (C4, C8). All non-fold corners are filleted (C9).
panels:
- id: A
  role: main
  width_mm: 160.0
  height_mm: 160.0
  parent_fold: null
  fold_axis: null
  fold_direction: null
  fold_position_mm: null
  extends_above_parent_mm: 0.0
  outline_carves:
  - kind: tab_carve
    side: bottom
    tab_width_mm: 60.0
    tab_height_mm: 20.0
    inset_from_edge_mm: 10.0
    concave_fillet_radius_mm: 8.0
  bumps:
  - kind: boss_stiffener
    center_xy_mm:
    - 40.0
    - 40.0
    side_mm: 30.0
    corner_radius_mm: 7.0
    color: yellow
    bolt_holes:
    - center_xy_mm:
      - 35.0
      - 40.0
      radius_mm: 2.5
    - center_xy_mm:
      - 45.0
      - 40.0
      radius_mm: 2.5
  - kind: boss_stiffener
    center_xy_mm:
    - 120.0
    - 40.0
    side_mm: 30.0
    corner_radius_mm: 7.0
    color: yellow
    bolt_holes:
    - center_xy_mm:
      - 115.0
      - 40.0
      radius_mm: 2.5
    - center_xy_mm:
      - 125.0
      - 40.0
      radius_mm: 2.5
  - kind: pocket_bump
    center_xy_mm:
    - 80.0
    - 100.0
    width_mm: 70.0
    height_mm: 40.0
    corner_radius_mm: 10.0
    color: yellow
    paired_hole_offset_mm: 5.0
  holes:
