    - 80.0
    - 100.0
    width_mm: 60.0
    height_mm: 30.0
    corner_radius_mm: 8.0
  corner_fillets:
  - corner: TL
    radius_mm: 10.0
  - corner: TR
    radius_mm: 10.0
- id: B
  role: flange
  width_mm: 40.0
  height_mm: 140.0
  parent_fold: AB
  fold_axis: V
  fold_direction: mountain
  fold_position_mm: 0.0
  extends_above_parent_mm: 0.0
  outline_carves: []
  bumps:
