schema_version: 1
case_name: simple_l_bracket_stage_a
scale_mm_per_px: 4
pad_mm: 20
intent_note: SKELETON for a simple L-bracket with a 120x100mm main plate and a 50mm
  flange, expanded to meet complexity floor requirements. This is a Stage A recipe;
  features will be added in later stages. Added two more M4 bolt holes to the right
  flange (panel B) to create a 3-hole pattern.
panels:
- id: A
  role: main
  width_mm: 120.0
  height_mm: 100.0
  parent_fold: null
  fold_axis: null
  fold_direction: null
  fold_position_mm: null
  extends_above_parent_mm: 0.0
  outline_carves:
  - kind: tab_carve
    side: bottom
    tab_width_mm: 40.0
    tab_height_mm: 14.0
    inset_from_edge_mm: 10.0
    concave_fillet_radius_mm: 6.0
  bumps:
  - kind: boss_stiffener
    center_xy_mm:
    - 35.0
    - 30.0
    side_mm: 26.0
    corner_radius_mm: 6.0
    color: yellow
    bolt_holes:
    - center_xy_mm:
      - 29.0
      - 30.0
      radius_mm: 2.0
    - center_xy_mm:
      - 41.0
      - 30.0
      radius_mm: 2.0
  - kind: boss_stiffener
    center_xy_mm:
    - 85.0
    - 30.0
    side_mm: 26.0
    corner_radius_mm: 6.0
    color: yellow
    bolt_holes:
    - center_xy_mm:
      - 79.0
      - 30.0
      radius_mm: 2.0
    - center_xy_mm:
      - 91.0
      - 30.0
      radius_mm: 2.0
  - kind: pocket_bump
    center_xy_mm:
    - 60.0
    - 70.0
    width_mm: 50.0
    height_mm: 30.0
    corner_radius_mm: 8.0
    color: yellow
    paired_hole_offset_mm: 5.0
  holes:
  - kind: pocket_hole
    center_xy_mm:
    - 60.0
    - 70.0
    width_mm: 40.0
    height_mm: 20.0
    corner_radius_mm: 6.0
  corner_fillets:
  - corner: TL
    radius_mm: 8.0
  - corner: BL
    radius_mm: 8.0
- id: B
  role: flange
  width_mm: 50.0
  height_mm: 90.0
  parent_fold: AB
  fold_axis: V
  fold_direction: mountain
  fold_position_mm: 0.0
  extends_above_parent_mm: 0.0
  outline_carves: []
  bumps: []
  holes:
  - kind: sub_panel_bolt
    center_xy_mm:
    - 25.0
    - 15.0
    radius_mm: 2.2
  - kind: sub_panel_bolt
    center_xy_mm:
    - 25.0
    - 45.0
    radius_mm: 2.2
  - kind: sub_panel_bolt
    center_xy_mm:
    - 25.0
    - 75.0
    radius_mm: 2.2
  corner_fillets:
  - corner: BR
    radius_mm: 5.0
- id: C
  role: cap
  width_mm: 50.0
  height_mm: 12.0
  parent_fold: BC
  fold_axis: H
  fold_direction: valley
  fold_position_mm: 0.0
  extends_above_parent_mm: 0.0
  outline_carves: []
  bumps: []
  holes: []
  corner_fillets: []
- id: D
  role: cap
  width_mm: 70.0
  height_mm: 12.0
  parent_fold: CD
  fold_axis: H
  fold_direction: mountain
  fold_position_mm: 0.0
  extends_above_parent_mm: 0.0
  outline_carves: []
  bumps: []
  holes:
  - kind: sub_panel_bolt
    center_xy_mm:
    - 35.0
    - 4.0
    radius_mm: 2.0
  corner_fillets:
  - corner: TL
    radius_mm: 4.0
  - corner: TR
    radius_mm: 4.0
cross_panel_folds:
- id: AB
  color: mountain
  parent_panel: A
  child_panel: B
  axis: V
  parent_edge: right
- id: BC
  color: valley
  parent_panel: B
  child_panel: C
  axis: H
  parent_edge: top
- id: CD
  color: mountain
  parent_panel: C
  child_panel: D
  axis: H
  parent_edge: top
cross_panel_features:
- kind: fold_spanning_bead
  anchor_fold: AB
  length_mm: 40.0
  width_mm: 8.0
  corner_radius_mm: 4.0
  color: yellow
  center_offset_mm: 0.0
