schema_version: 1
case_name: u_bracket_trim_mount
scale_mm_per_px: 4
pad_mm: 30
intent_note: 'U-bracket for an interior trim mount. Features a 160x160mm main plate

  with flanges on both left and right sides. Each flange is topped by a cap

  panel. This design fulfills all C1-C11 complexity requirements: 5 panels

  total (C1), one valley fold on the left cap stack (C2), the right cap is

  wider than its parent flange (C3), the main plate has a diagonal corner

  cut and a bottom tab carve for an irregular outline (C4, C8), two 3-bolt

  boss stiffeners (C5, C10), a central pocket-with-bump (C6), a bead

  spanning the main-to-right-flange fold (C7), fillets on all free

  corners (C9), and bolts on three separate sub-panels (C11).

  '
panels:
- id: A
  role: main
  width_mm: 160.0
  height_mm: 160.0
  parent_fold: null
  fold_axis: null
  fold_direction: null
  fold_position_mm: null
  extends_above_parent_mm: 0.0
  outline_carves:
  - kind: corner_diagonal
    corner: TL
    inset_mm: 30.0
  - kind: corner_qcut
    corner: TR
    radius_mm: 15.0
  - kind: tab_carve
    side: bottom
    tab_width_mm: 50.0
    tab_height_mm: 20.0
    inset_from_edge_mm: 10.0
    concave_fillet_radius_mm: 8.0
  bumps:
