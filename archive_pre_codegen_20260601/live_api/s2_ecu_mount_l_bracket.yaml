schema_version: 1
case_name: ecu_mount_l_bracket
scale_mm_per_px: 4
pad_mm: 25
intent_note: 'A 5-panel L-bracket for an automotive ECU mount, designed to meet all
  C1-C11 complexity floor rules.

  C1: 5 panels (A-main, B-flange, C/D/E-cap stack).

  C2: Fold B->C is a valley fold.

  C3: Panel D (50mm wide) is wider than its parent C (40mm wide).

  C4: Main panel A has a top-left corner_diagonal and a bottom tab_carve for an irregular
  outline.

  C5: Two boss stiffeners on panel A, each with two M6-sized bolt holes.

  C6: A central pocket_bump paired with a pocket_hole on panel A.

  C7: A fold-spanning bead crosses the main A->B fold.

  C8: The tab_carve on panel A includes concave fillets at the inner corners.

  C9: All free (non-fold) corners on all panels are filleted.

  C10: All bolt holes maintain a >4mm margin from their boss edges.

  C11: Sub-panel bolt holes are present on flange B and cap D.

  '
panels:
- id: A
  role: main
  width_mm: 130.0
  height_mm: 150.0
  parent_fold: null
  fold_axis: null
  fold_direction: null
  fold_position_mm: null
  extends_above_parent_mm: 0.0
  outline_carves:
  - kind: corner_diagonal
    corner: TL
    inset_mm: 30.0
  - kind: corner_qcut
    corner: BL
    radius_mm: 10.0
  - kind: tab_carve
    side: bottom
    tab_width_mm: 50.0
    tab_height_mm: 15.0
    inset_from_edge_mm: 10.0
    concave_fillet_radius_mm: 8.0
  bumps:
  - kind: boss_stiffener
    center_xy_mm:
    - 35.0
    - 35.0
    side_mm: 26.0
    corner_radius_mm: 6.0
    color: yellow
    bolt_holes:
    - center_xy_mm:
      - 30.0
      - 35.0
      radius_mm: 3.0
    - center_xy_mm:
      - 40.0
      - 35.0
      radius_mm: 3.0
  - kind: boss_stiffener
    center_xy_mm:
    - 35.0
    - 115.0
    side_mm: 26.0
    corner_radius_mm: 6.0
    color: yellow
    bolt_holes:
    - center_xy_mm:
      - 30.0
      - 115.0
      radius_mm: 3.0
    - center_xy_mm:
      - 40.0
      - 115.0
      radius_mm: 3.0
  - kind: pocket_bump
    center_xy_mm:
    - 80.0
    - 75.0
    width_mm: 60.0
    height_mm: 40.0
    corner_radius_mm: 10.0
    color: yellow
    paired_hole_offset_mm: 5.0
  holes:
  - kind: pocket_hole
    center_xy_mm:
    - 80.0
    - 75.0
    width_mm: 50.0
    height_mm: 30.0
    corner_radius_mm: 8.0
  corner_fillets: []
- id: B
  role: flange
  width_mm: 40.0
  height_mm: 130.0
  parent_fold: AB
  fold_axis: V
  fold_direction: mountain
  fold_position_mm: null
  extends_above_parent_mm: 10.0
  outline_carves: []
  bumps: []
  holes:
  - kind: sub_panel_bolt
    center_xy_mm:
    - 20.0
    - 40.0
    radius_mm: 3.0
  - kind: sub_panel_bolt
    center_xy_mm:
    - 20.0
    - 100.0
    radius_mm: 3.0
  corner_fillets:
  - corner: BL
    radius_mm: 8.0
  - corner: BR
    radius_mm: 8.0
- id: C
  role: cap
  width_mm: 40.0
  height_mm: 12.0
  parent_fold: BC
  fold_axis: H
  fold_direction: valley
  fold_position_mm: null
  extends_above_parent_mm: 0.0
  outline_carves: []
  bumps: []
  holes: []
  corner_fillets: []
- id: D
  role: cap
  width_mm: 50.0
  height_mm: 15.0
  parent_fold: CD
  fold_axis: H
  fold_direction: mountain
  fold_position_mm: null
  extends_above_parent_mm: 0.0
  outline_carves: []
  bumps: []
  holes:
  - kind: sub_panel_bolt
    center_xy_mm:
    - 25.0
    - 7.0
    radius_mm: 3.0
  corner_fillets:
  - corner: TL
    radius_mm: 5.0
  - corner: TR
    radius_mm: 5.0
- id: E
  role: cap
  width_mm: 50.0
  height_mm: 12.0
  parent_fold: DE
  fold_axis: H
  fold_direction: mountain
  fold_position_mm: null
  extends_above_parent_mm: 0.0
  outline_carves: []
  bumps: []
  holes: []
  corner_fillets:
  - corner: TL
    radius_mm: 5.0
  - corner: TR
    radius_mm: 5.0
cross_panel_folds:
- id: AB
  color: mountain
  parent_panel: A
  child_panel: B
  axis: V
  parent_edge: right
- id: BC
  color: valley
  parent_panel: B
  child_panel: C
  axis: H
  parent_edge: top
- id: CD
  color: mountain
  parent_panel: C
  child_panel: D
  axis: H
  parent_edge: top
- id: DE
  color: mountain
  parent_panel: D
  child_panel: E
  axis: H
  parent_edge: top
cross_panel_features:
- kind: fold_spanning_bead
  anchor_fold: AB
  length_mm: 60.0
  width_mm: 10.0
  corner_radius_mm: 5.0
  color: yellow
  center_offset_mm: 60.0
