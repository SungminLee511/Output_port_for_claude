schema_version: 1
case_name: cross_bracket_hvac
scale_mm_per_px: 4
pad_mm: 25
intent_note: 'A cross-shaped bracket with a central main plate (100x120 mm) and flanges
  folded off all four sides. The left flange carries a wider cap panel, folded in
  the valley direction. This skeleton is designed to meet all Stage A complexity requirements
  (C1, C2, C3, C4, C8, C9) and prepares the design for feature addition in subsequent
  stages.

  '
