schema_version: 1
case_name: ecu_mount_l_bracket
scale_mm_per_px: 4
pad_mm: 25
intent_note: 'A 5-panel L-bracket skeleton for an automotive ECU mount.

  The main plate is 130x150 mm, with a right-side flange that

  carries a 3-panel cap stack. The design meets complexity

  floor requirements C1-C4, C8, and C9 for a Stage-A skeleton.

  It includes a valley fold (C2), a wider-child fold (C3), and

  outline carves on the main plate (C4, C8).

  '
panels:
- id: A
  role: main
  width_mm: 130.0
  height_mm: 150.0
  parent_fold: null
  fold_axis: null
  fold_direction: null
  fold_position_mm: null
  extends_above_parent_mm: 0.0
  outline_carves:
  - kind: corner_qcut
    corner: TL
    radius_mm: 15.0
  - kind: tab_carve
    side: bottom
    tab_width_mm: 40.0
    tab_height_mm: 14.0
    inset_from_edge_mm: 10.0
    concave_fillet_radius_mm: 6.0
  bumps:
  - kind: boss_stiffener
    center_xy_mm:
    - 30.0
    - 30.0
    side_mm: 28.0
    corner_radius_mm: 6.0
    color: yellow
    bolt_holes:
    - center_xy_mm:
      - 25.0
      - 30.0
      radius_mm: 2.0
    - center_xy_mm:
      - 35.0
      - 30.0
      radius_mm: 2.0
  - kind: boss_stiffener
    center_xy_mm:
    - 30.0
    - 110.0
    side_mm: 28.0
    corner_radius_mm: 6.0
    color: yellow
    bolt_holes:
    - center_xy_mm:
      - 30.0
      - 105.0
      radius_mm: 2.0
    - center_xy_mm:
      - 30.0
      - 115.0
      radius_mm: 2.0
  - kind: pocket_bump
    center_xy_mm:
    - 65.0
    - 75.0
    width_mm: 50.0
    height_mm: 40.0
    corner_radius_mm: 10.0
    color: yellow
    paired_hole_offset_mm: 5.0
  holes:
  - kind: pocket_hole
    center_xy_mm:
    - 65.0
    - 75.0
    width_mm: 40.0
    height_mm: 30.0
    corner_radius_mm: 8.0
  corner_fillets:
  - corner: BL
    radius_mm: 8.0
- id: B
  role: flange
  width_mm: 40.0
  height_mm: 130.0
  parent_fold: AB
  fold_axis: V
  fold_direction: mountain
  fold_position_mm: 0.0
  extends_above_parent_mm: 0.0
  outline_carves: []
  bumps: []
  holes:
  - kind: sub_panel_bolt
    center_xy_mm:
    - 20.0
    - 45.0
    radius_mm: 2.5
  - kind: sub_panel_bolt
    center_xy_mm:
    - 20.0
    - 85.0
    radius_mm: 2.5
  corner_fillets:
  - corner: TR
    radius_mm: 6.0
  - corner: BR
    radius_mm: 6.0
- id: C
