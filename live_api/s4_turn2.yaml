schema_version: 1
case_name: l_bracket_complex_v1
scale_mm_per_px: 4
pad_mm: 25
intent_note: 'This design realizes the user''s request for a 120x100mm L-bracket with
  a 50mm flange, but enhances it to meet the Origami_Gen v3 complexity floor. It features
  a 4-panel topology (main, flange, two caps) satisfying C1. A valley fold (B->C)
  and a wider-child fold (C->D) satisfy C2 and C3. The main plate outline is made
  irregular with a corner diagonal and a bottom tab carve with concave fillets (C4,
  C8). It includes two boss stiffeners with two bolt holes each (C5, C10) and a central
  pocket-with-bump feature (C6). A fold-spanning bead crosses the main A->B fold (C7).
  All non-fold corners are filleted (C9), and two sub-panels (B and D) include bolt
  holes (C11).

  '
panels:
- id: A
  role: main
  width_mm: 120.0
  height_mm: 100.0
  parent_fold: null
  fold_axis: null
  fold_direction: null
  fold_position_mm: null
  extends_above_parent_mm: 0.0
  outline_carves:
  - kind: corner_diagonal
    corner: TL
    inset_mm: 25.0
  - kind: corner_qcut
    corner: BL
    radius_mm: 8.0
  - kind: tab_carve
    side: bottom
    tab_width_mm: 40.0
    tab_height_mm: 15.0
    inset_from_edge_mm: 10.0
    concave_fillet_radius_mm: 6.0
  bumps:
  - kind: boss_stiffener
    center_xy_mm:
    - 30.0
    - 30.0
    side_mm: 28.0
    corner_radius_mm: 6.0
    color: yellow
    bolt_holes:
    - center_xy_mm:
      - 24.0
      - 30.0
      radius_mm: 2.0
    - center_xy_mm:
      - 36.0
      - 30.0
      radius_mm: 2.0
  - kind: boss_stiffener
    center_xy_mm:
    - 90.0
    - 30.0
    side_mm: 28.0
    corner_radius_mm: 6.0
    color: yellow
    bolt_holes:
    - center_xy_mm:
      - 84.0
      - 30.0
      radius_mm: 2.0
    - center_xy_mm:
      - 96.0
      - 30.0
      radius_mm: 2.0
  - kind: pocket_bump
    center_xy_mm:
    - 60.0
    - 70.0
    width_mm: 50.0
    height_mm: 30.0
    corner_radius_mm: 7.0
    color: yellow
    paired_hole_offset_mm: 5.0
  holes:
  - kind: pocket_hole
    center_xy_mm:
    - 60.0
    - 70.0
    width_mm: 40.0
    height_mm: 20.0
    corner_radius_mm: 5.0
  corner_fillets: []
- id: B
  role: flange
  width_mm: 50.0
  height_mm: 90.0
  parent_fold: AB
  fold_axis: V
  fold_direction: mountain
  fold_position_mm: 5.0
  extends_above_parent_mm: 0.0
  outline_carves: []
  bumps: []
  holes:
  - kind: sub_panel_bolt
    center_xy_mm:
    - 25.0
    - 25.0
    radius_mm: 2.2
  - kind: sub_panel_bolt
    center_xy_mm:
    - 25.0
    - 55.0
    radius_mm: 2.2
  - kind: sub_panel_bolt
    center_xy_mm:
    - 25.0
    - 75.0
    radius_mm: 2.5
  corner_fillets:
  - corner: TL
    radius_mm: 6.0
  - corner: BL
    radius_mm: 6.0
  - corner: BR
    radius_mm: 6.0
- id: C
  role: cap
  width_mm: 50.0
  height_mm: 10.0
  parent_fold: BC
  fold_axis: H
  fold_direction: valley
  fold_position_mm: 0.0
  extends_above_parent_mm: 0.0
  outline_carves: []
  bumps: []
  holes: []
  corner_fillets: []
- id: D
  role: cap
  width_mm: 60.0
  height_mm: 12.0
  parent_fold: CD
  fold_axis: H
  fold_direction: mountain
  fold_position_mm: -5.0
  extends_above_parent_mm: 0.0
  outline_carves: []
  bumps: []
  holes:
  - kind: sub_panel_bolt
    center_xy_mm:
    - 15.0
    - 5.0
    radius_mm: 2.0
  - kind: sub_panel_bolt
    center_xy_mm:
    - 45.0
    - 5.0
    radius_mm: 2.0
  corner_fillets:
