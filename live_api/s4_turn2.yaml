    radius_mm: 4.0
  - corner: TR
    radius_mm: 4.0
  - corner: BL
    radius_mm: 4.0
  - corner: BR
    radius_mm: 4.0
cross_panel_folds:
- id: AB
  color: mountain
  parent_panel: A
  child_panel: B
  axis: V
  parent_edge: right
- id: BC
  color: valley
  parent_panel: B
