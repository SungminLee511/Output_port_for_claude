schema_version: 1
case_name: hvac_cross_support
scale_mm_per_px: 4
pad_mm: 25
intent_note: 'A cross-shaped bracket for HVAC support. Main plate (A) with four flanges
  (B, C, D, E). The left flange (B) carries a wider cap (F), satisfying C3. Fold B→F
  is a valley fold (C2). The main plate outline is made irregular by a corner diagonal
  and a tab carve with concave fillets (C4, C8). Two boss stiffeners with two bolts
  each are on the main plate (C5, C10), along with a pocket-and-bump feature (C6).
  A fold-spanning bead crosses the main plate to the bottom flange (C7). Bolts are
  also present on two sub-panels, D and F (C11). All free corners are filleted (C9).
  Total of 6 panels satisfies C1.

  '
